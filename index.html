<!DOCTYPE html>
<html lang="pa">
<head>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        #call-screen { width: 350px; text-align: center; }
        #avatar { width: 150px; height: 150px; background: #3498db; border-radius: 50%; margin: 20px auto; transition: 0.3s; }
        .talking { transform: scale(1.1); background: #27ae60 !important; box-shadow: 0 0 20px #27ae60; }
        button { padding: 15px 30px; font-size: 16px; border-radius: 30px; border: none; cursor: pointer; background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div id="call-screen">
    <h3>English Guru AI</h3>
    <div id="avatar"></div>
    <p id="status">ਬਟਨ ਦਬਾ ਕੇ ਗੱਲ ਕਰੋ...</p>
    <button onclick="startListening()">🎙️ Start Talk</button>
</div>

<script>
    const avatar = document.getElementById('avatar');
    const status = document.getElementById('status');
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    
    // AI ਹੁਣ ਪੰਜਾਬੀ ਅਤੇ ਅੰਗਰੇਜ਼ੀ ਦੋਵਾਂ ਵਿੱਚ ਜਵਾਬ ਦੇਵੇਗਾ
    const systemPrompt = "You are a friendly English tutor. Speak in both English and Punjabi. Correct the user's grammar mistakes and explain why they were wrong. Be conversational like a video call.";

    function startListening() {
        recognition.start();
        status.innerText = "Listening...";
    }

    recognition.onresult = async (event) => {
        const userSpeech = event.results[0][0].transcript;
        status.innerText = "Guru is thinking...";

        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer 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",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{ role: "system", content: systemPrompt }, { role: "user", content: userSpeech }]
            })
        });

        const data = await response.json();
        const aiReply = data.choices[0].message.content;
        speak(aiReply);
    };

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB'; // English accent
        
        avatar.classList.add('talking'); // ਬੋਲਣ ਦੀ ਐਨੀਮੇਸ਼ਨ
        utterance.onend = () => avatar.classList.remove('talking');
        
        window.speechSynthesis.speak(utterance);
        status.innerText = "Guru is speaking...";
    }
</script>
</body>
</html>
